services:

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - backend

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  classservice:
    build:
      context: ./ClassServiceAPI
    ports:
      - "5001:8080"
    environment:
      RabbitMQ__Host: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  messageservice:
    build:
      context: ./MessageServiceAPI
    ports:
      - "5002:8080"
    environment:
      RabbitMQ__Host: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - backend

networks:
  backend:
    name: backend

volumes:
  mongodb_data:
  vault_data:
  grafana_data: