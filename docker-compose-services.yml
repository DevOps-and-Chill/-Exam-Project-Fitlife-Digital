services:

  facilityservice:
    build:
      context: ./FacilityService/FacilityServiceAPI

    expose:
    - "8080"

    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  classservice:
    build:
      context: ./ClassServiceAPI

    expose:
      - "8080"

    environment:
      RabbitMQ__Host: rabbitmq
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  messageservice:
    build:
      context: ./MessageServiceAPI

    expose:
      - "8080"

    environment:
      RabbitMQ__Host: rabbitmq
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  ptservice:
    build:
      context: ./PTService/PTServiceAPI

    expose:
      - "8080"

    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend


  statisticservice:
    build:
      context: ./StatisticService/StatisticServiceAPI
    expose:
      - "8080"

    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  authservice:
    build:
      context: ./AuthService/AuthServiceAPI

    expose:
      - "8080"

    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  userservice:
    build:
      context: ./UserService/UserService

    expose:
      - "8080"

    environment:
      VAULT_TOKEN: ${VAULT_TOKEN}

    networks:
      - backend



  gateway:
    image: nginx:alpine

    ports:
      - "4000:4000"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - backend



networks:

  backend:
    external: true