services:

  frontend:

    build:
      context: ./FitLife.Frontend

    container_name: frontend

    expose:
      - "8080"

    environment:
      ASPNETCORE_URLS: http://+:8080 
      GatewayBaseUrl: http://gateway:4000/

    networks:
      - backend
 
  gateway:
    image: nginx:alpine

    ports:
      - "4000:4000"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - backend

networks:

  backend:
    external: true