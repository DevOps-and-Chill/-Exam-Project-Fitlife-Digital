# Kører NGINX som nginx-bruger
user nginx;

# Antal samtidige forbindelser
events {
    worker_connections 1000;
}

http {

    # ---------- UPSTREAMS ----------
    # Azure Container Instance / Container Group version
    # Alle services kører i samme container group.
    # Derfor bruger vi localhost + unikke porte i stedet for Docker Compose service names.

    upstream facility_service {
        server localhost:8083;
    }

    upstream class_service {
        server localhost:8082;
    }

    upstream message_service {
        server localhost:8084;
    }

    upstream pt_service {
        server localhost:8085;
    }

    upstream rapport_service {
        server localhost:8086;
    }

    upstream auth_service {
        server localhost:8081;
    }

    upstream user_service {
        server localhost:8087;
    }


    # ---------- API GATEWAY ----------

    server {

        # Port som gateway eksponerer
        listen 4000;


        # Facility
        location /facility/ {
            proxy_pass http://facility_service/;
        }


        # Class
        location /class/ {
            proxy_pass http://class_service/;
        }


        # Message
        location /message/ {
            proxy_pass http://message_service/;
        }


        # PT
        location /pt/ {
            proxy_pass http://pt_service/;
        }


        # Rapport
        location /rapport/ {
            proxy_pass http://rapport_service/;
        }


        # Auth
        location /auth/ {
            proxy_pass http://auth_service/;
        }


        # User
        location /user/ {
            proxy_pass http://user_service/;
        }
    }
}